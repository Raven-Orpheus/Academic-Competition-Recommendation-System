<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的日程 — 赛事推荐与日程管理系统</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1d4ed8;
    --primary-dark: #1e3a8a;
    --surface: #ffffff;
    --bg: #f1f5f9;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-sub: #64748b;
    --green: #16a34a;
    --orange: #ea580c;
    --red: #dc2626;
  }
  body { background: var(--bg); font-family: "Microsoft YaHei", "PingFang SC", sans-serif; min-height: 100vh; }

  .navbar {
    background: var(--primary-dark); color: #fff; padding: 0 48px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .navbar-brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
  .navbar-nav { display: flex; gap: 8px; }
  .nav-link {
    padding: 7px 16px; border-radius: 8px; color: rgba(255,255,255,0.75);
    font-size: 13px; text-decoration: none; transition: all 0.2s; cursor: pointer;
  }
  .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.12); color: #fff; }

  .container { padding: 36px 48px; max-width: 1200px; margin: 0 auto; }

  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 32px; }
  .sum-card {
    background: var(--surface); border-radius: 14px; padding: 24px 28px;
    border: 1.5px solid var(--border); box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 18px;
  }
  .sum-card .sum-icon {
    width: 50px; height: 50px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
  }
  .sum-card:nth-child(1) .sum-icon { background: #eff6ff; }
  .sum-card:nth-child(2) .sum-icon { background: #fff7ed; }
  .sum-card .sum-data .num { font-size: 30px; font-weight: 700; color: var(--primary); line-height: 1; }
  .sum-card .sum-data .label { font-size: 13px; color: var(--text-sub); margin-top: 5px; }

  .table-wrapper {
    background: var(--surface); border-radius: 16px; overflow: hidden;
    border: 1.5px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
  }
  .table-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .btn-refresh {
    padding: 8px 18px; background: transparent; border: 1.5px solid var(--border);
    border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--text-sub);
    font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { border-color: var(--primary); color: var(--primary); }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { background: #f8fafc; }
  th {
    padding: 14px 16px; text-align: left; font-size: 13px; font-weight: 700;
    color: var(--text-sub); border-bottom: 1px solid var(--border);
  }
  /* 列宽分配 */
  th:nth-child(1) { width: 40px; }
  th:nth-child(2) { width: 26%; }
  th:nth-child(3) { width: 72px; }
  th:nth-child(4) { width: 18%; }
  th:nth-child(5) { width: 15%; }
  th:nth-child(6) { width: 24%; }

  td { padding: 14px 16px; font-size: 14px; color: var(--text); border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f8fafc; }

  /* ─── 赛事名称可点击跳转官网 ─── */
  .comp-name-cell {
    font-weight: 600;
    word-break: break-word;
  }
  .comp-name-link {
    font-weight: 600;
    color: #1e293b;
    transition: color 0.2s ease;
    cursor: default;
  }
  .comp-name-link.has-link {
    cursor: pointer;
  }
  .comp-name-link.has-link:hover {
    color: #1d4ed8 !important;
    text-decoration: underline;
  }

  .time-cell { font-family: monospace; font-weight: 500; }
  .user-time { color: #16a34a; font-weight: 600; }
  .official-time { color: #64748b; }

  .badge {
    display: inline-flex; align-items: center; padding: 4px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge-国赛 { background: #fff7ed; color: #c2410c; }
  .badge-省赛 { background: #eff6ff; color: #1d4ed8; }
  .badge-校赛 { background: #f0fdf4; color: #16a34a; }

  .urgent-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700;
    background: #fef2f2; color: #dc2626; margin-left: 8px;
  }

  /* ── 操作列：三个按钮排成一行，不折行 ── */
  .action-cell {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    align-items: center;
    justify-content: flex-start;
  }
  .action-btn {
    padding: 3px 8px;
    font-size: 11.5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-family: inherit;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .btn-set {
    background: #3b82f6;
    color: white;
  }
  .btn-set:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(59,130,246,0.3); }

  .btn-clear {
    background: #ef4444;
    color: white;
  }
  .btn-clear:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(239,68,68,0.3); }

  .btn-remove {
    background: #6c757d;
    color: white;
  }
  .btn-remove:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(220,38,38,0.3); }

  .btn-note {
    background-color: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
    padding: 3px 10px;
    font-size: 11.5px;
    border-radius: 14px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .btn-note:hover {
    transform: scale(1.05);
    background-color: #dbeafe;
    border-color: #60a5fa;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.2);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .btn-note.has-note {
    background-color: #dbeafe;
    color: #1e40af;
    border-color: #93c5fd;
  }
  .btn-note.has-note:hover {
    background-color: #bfdbfe;
    border-color: #60a5fa;
  }

  /* ── Modal ── */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    padding: 28px 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }
  .modal-content label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  .modal-content input[type="date"],
  .modal-content textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    margin-bottom: 16px;
    font-family: inherit;
    transition: border 0.2s;
    background: #fafbfc;
  }
  .modal-content input[type="date"]:focus,
  .modal-content textarea:focus {
    border-color: var(--primary);
    outline: none;
    background: white;
  }
  .modal-content textarea {
    resize: vertical;
    min-height: 80px;
  }
  .modal-content .char-count {
    font-size: 12px;
    color: var(--text-sub);
    text-align: right;
    margin-top: -8px;
    margin-bottom: 8px;
  }
  .modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .modal-btn-cancel {
    background: #f1f5f9;
    color: #64748b;
  }
  .modal-btn-cancel:hover { background: #e2e8f0; }
  .modal-btn-confirm {
    background: var(--primary);
    color: white;
  }
  .modal-btn-confirm:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(29,78,216,0.3); }

  /* ── 加载 & 空状态 ── */
  #loadingRow td { text-align: center; padding: 60px; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state {
    text-align: center; padding: 80px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .empty-state .empty-icon { font-size: 48px; }
  .empty-state p { color: var(--text-sub); font-size: 15px; }
  .empty-state a {
    margin-top: 4px; padding: 10px 28px; background: var(--primary); color: #fff;
    border-radius: 9px; text-decoration: none; font-size: 14px; font-weight: 600;
    display: inline-block; transition: background 0.2s;
  }
  .empty-state a:hover { background: var(--primary-dark); }

  /* ── 响应式 ── */
  @media (max-width: 1024px) {
    .container { padding: 24px 24px; }
    th, td { padding: 10px 12px; }
    th:nth-child(1) { width: 32px; }
    th:nth-child(2) { width: 22%; }
    th:nth-child(6) { width: 24%; }
    .action-btn { font-size: 11px; padding: 2px 6px; }
    .btn-note { font-size: 11px; padding: 2px 8px; }
  }
  @media (max-width: 768px) {
    .navbar { padding: 0 16px; height: 56px; }
    .navbar-brand { font-size: 15px; }
    .nav-link { font-size: 12px; padding: 4px 10px; }
    .container { padding: 16px 12px; }
    .summary-grid { grid-template-columns: 1fr; gap: 12px; }
    .sum-card { padding: 16px 20px; }
    .sum-card .sum-data .num { font-size: 24px; }
    .table-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
    .table-title { font-size: 16px; }
    th, td { padding: 8px 6px; font-size: 12px; }
    th:nth-child(1) { width: 24px; }
    th:nth-child(3) { width: 50px; }
    th:nth-child(6) { width: 26%; }
    .action-btn { font-size: 10px; padding: 2px 5px; }
    .btn-note { font-size: 10px; padding: 2px 6px; border-radius: 12px; }
    .modal-content { padding: 20px 16px; }
  }
  @media (max-width: 480px) {
    .action-cell { gap: 2px; flex-wrap: wrap; }
    .action-btn { font-size: 9.5px; padding: 2px 4px; }
    .btn-note { font-size: 9.5px; padding: 2px 5px; }
  }
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-brand">🏆 赛事推荐与日程管理系统</div>
  <div class="navbar-nav">
    <a class="nav-link" href="index.html">首页</a>
    <a class="nav-link" href="competition.html">赛事列表</a>
    <a class="nav-link active">我的日程</a>
    <a class="nav-link" href="feedback.html">意见反馈</a>
    <a class="nav-link" onclick="logout()">退出</a>
  </div>
</div>

<div class="container">
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-icon">📋</div>
      <div class="sum-data">
        <div class="num" id="totalCount">—</div>
        <div class="label">已参加赛事</div>
      </div>
    </div>
    <div class="sum-card">
      <div class="sum-icon">⏰</div>
      <div class="sum-data">
        <div class="num" id="urgentCount">—</div>
        <div class="label">7天内截止</div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-header">
      <div class="table-title">📅 我的赛事日程</div>
      <button class="btn-refresh" onclick="loadMySchedule()">🔄 刷新</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>赛事名称</th>
          <th>级别</th>
          <th>显示时间</th>
          <th>官方时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="schBody">
        <tr id="loadingRow">
          <td colspan="6">
            <div class="spinner"></div>
            <div style="color:#64748b;font-size:14px;">正在加载日程…</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 日期选择模态框 -->
<div id="dateModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">📅 设置比赛日期</div>
    <label for="datePicker">选择日期</label>
    <input type="date" id="datePicker" />
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="hideModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="saveScheduleDate()">确定</button>
    </div>
  </div>
</div>

<!-- 备注编辑模态框 -->
<div id="noteModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">📝 编辑备注</div>
    <label for="noteTextarea">备注内容（最多500字）</label>
    <textarea id="noteTextarea" placeholder="输入备注信息…" maxlength="500"></textarea>
    <div class="char-count"><span id="noteCharCount">0</span> / 500</div>
    <input type="hidden" id="noteCompId" value="">
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="closeNoteModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<script>
  const BASE = `http://127.0.0.1:5000`;
  const userid = localStorage.getItem('userid');
  if (!userid) { alert('请先登录'); location.href = 'login.html'; }

  let currentCompId = null;
  let currentButton = null;
  // 全局存储日程数据，供跳转函数使用
  window.scheduleData = [];

  // ---------- 字符计数 ----------
  document.getElementById('noteTextarea').addEventListener('input', function() {
    document.getElementById('noteCharCount').innerText = this.value.length;
  });

  // ---------- 日期工具 ----------
  function isUrgent(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    const now = new Date();
    const diff = (d - now) / (1000 * 60 * 60 * 24);
    return diff >= 0 && diff <= 7;
  }

  function showDateModal(comp_id, btn) {
    currentCompId = comp_id;
    currentButton = btn;
    document.getElementById('datePicker').value = '';
    document.getElementById('dateModal').style.display = 'flex';
  }

  function hideModal() {
    document.getElementById('dateModal').style.display = 'none';
  }

  // ---------- 设置日期 ----------
  async function saveScheduleDate() {
    const newDate = document.getElementById('datePicker').value;
    if (!newDate) {
      alert("请选择日期！");
      return;
    }
    hideModal();

    const btn = currentButton;
    if (btn) {
      btn.disabled = true;
      btn.textContent = "保存中...";
    }

    try {
      const res = await fetch(`${BASE}/api/update_schedule_time`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userid,
          comp_id: currentCompId,
          sch_time: newDate
        })
      });

      const result = await res.json();
      if (result.code === 200) {
        alert("✅ 日期设置成功！");
        loadMySchedule();
      } else {
        alert("❌ " + (result.msg || "设置失败"));
        if (btn) {
          btn.disabled = false;
          btn.textContent = "📅 设置日期";
        }
      }
    } catch (e) {
      alert("网络请求失败，请检查后端是否运行");
      if (btn) {
        btn.disabled = false;
        btn.textContent = "📅 设置日期";
      }
    }
  }

  // ---------- 清除日期 ----------
  async function clearScheduleTime(comp_id, btn) {
    if (!confirm("确定要清除手动设置的日期吗？\n清除后将恢复使用官方比赛时间。")) {
      return;
    }

    btn.disabled = true;
    btn.textContent = "清除中...";

    try {
      const res = await fetch(`${BASE}/api/update_schedule_time`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userid,
          comp_id: comp_id,
          sch_time: null
        })
      });

      const result = await res.json();
      if (result.code === 200) {
        alert("✅ 已清除手动设置的日期");
        loadMySchedule();
      } else {
        alert("❌ " + (result.msg || "清除失败"));
        btn.disabled = false;
        btn.textContent = "清除手动时间";
      }
    } catch (e) {
      alert("网络请求失败，请检查后端是否运行");
      btn.disabled = false;
      btn.textContent = "清除手动时间";
    }
  }

  // ---------- 移除报名 ----------
  async function unselectComp(comp_id, btn) {
    if (!confirm("确定要取消报名该赛事吗？\n相关日程记录也将被删除。")) {
      return;
    }

    btn.disabled = true;
    btn.textContent = "移除中...";

    try {
      const res = await fetch(`${BASE}/api/unselect_comp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userid,
          comp_id: comp_id
        })
      });

      const result = await res.json();
      if (result.code === 200) {
        alert("✅ 已取消报名");
        loadMySchedule();
      } else {
        alert("❌ " + (result.msg || "移除失败"));
        btn.disabled = false;
        btn.textContent = "移除比赛";
      }
    } catch (e) {
      alert("网络请求失败，请检查后端是否运行");
      btn.disabled = false;
      btn.textContent = "移除比赛";
    }
  }

  // ---------- 备注编辑 ----------
  function openNoteModal(el) {
    const comp_id = el.dataset.comp;
    const note = el.dataset.note || '';
    document.getElementById('noteCompId').value = comp_id;
    document.getElementById('noteTextarea').value = note;
    document.getElementById('noteCharCount').innerText = note.length;
    document.getElementById('noteModal').style.display = 'flex';
  }

  function closeNoteModal() {
    document.getElementById('noteModal').style.display = 'none';
  }

  async function saveNote() {
    const comp_id = document.getElementById('noteCompId').value;
    const note = document.getElementById('noteTextarea').value.trim();
    if (note.length > 500) {
      alert('备注不能超过500字');
      return;
    }
    try {
      const res = await fetch(`${BASE}/api/update_schedule_note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userid,
          comp_id: comp_id,
          note: note
        })
      });
      const result = await res.json();
      if (result.code === 200) {
        closeNoteModal();
        alert('✅ 备注已保存');
        loadMySchedule();
      } else {
        alert('❌ ' + (result.msg || '保存失败'));
      }
    } catch (e) {
      alert('网络请求失败，请检查后端');
    }
  }

  // ─── 点击赛事名称跳转官网 ───
  function goToOfficialUrl(comp_id) {
    const item = window.scheduleData.find(d => d.comp_id === comp_id);
    if (item && item.official_url && item.official_url.trim() !== '') {
      window.open(item.official_url, '_blank');
    } else {
      alert('该赛事暂无官网链接');
    }
  }

  // ---------- 加载日程（含去重逻辑） ----------
  async function loadMySchedule() {
    const body = document.getElementById('schBody');
    body.innerHTML = `
      <tr id="loadingRow">
        <td colspan="6">
          <div class="spinner"></div>
          <div style="color:#64748b;font-size:14px;">正在加载日程…</div>
        </td>
      </tr>`;

    try {
      const res = await fetch(`${BASE}/api/schedule/${userid}`);
      const result = await res.json();
      const rawData = result.data || [];

      // 按 comp_id 去重
      const uniqueMap = new Map();
      rawData.forEach(item => {
        if (!uniqueMap.has(item.comp_id)) {
          uniqueMap.set(item.comp_id, item);
        }
      });
      const data = Array.from(uniqueMap.values());

      // 存到全局变量供跳转使用
      window.scheduleData = data;

      if (rawData.length !== data.length) {
        console.log(`🔍 检测到 ${rawData.length - data.length} 个重复日程条目（相同 comp_id），已自动过滤。`);
      }

      if (!data.length) {
        body.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <p>暂无日程记录，快去参加比赛吧！</p>
              <a href="competition.html">浏览赛事列表</a>
            </div>
          </td></tr>`;
        updateCount(0, 0);
        return;
      }

      let urgent = 0;
      body.innerHTML = data.map((item, i) => {
        const userTime = item.sch_time;
        const officialTime = item.game_time;
        const displayTime = userTime
          ? `<span class="user-time">${userTime}（手动设置）</span>`
          : (officialTime || '待定');

        const urg = isUrgent(userTime || officialTime);
        if (urg) urgent++;

        const hasManual = !!userTime;
        const isPending = !userTime && !officialTime;

        // 备注内容
        const noteText = item.note || '';
        const noteLabel = noteText ? '📝 编辑' : '+ 添加备注';

        // 判断是否有官网链接
        const hasUrl = item.official_url && item.official_url.trim() !== '';
        const linkClass = hasUrl ? 'comp-name-link has-link' : 'comp-name-link';

        // ─── 构建操作按钮 ───
        let actionBtns = '';

        if (isPending || !hasManual) {
          actionBtns += `<button onclick="showDateModal('${item.comp_id}', this)" class="action-btn btn-set">📅 设置日期</button>`;
        }

        if (hasManual) {
          actionBtns += `<button onclick="clearScheduleTime('${item.comp_id}', this)" class="action-btn btn-clear">清除手动时间</button>`;
        }

        actionBtns += `
          <button class="btn-note ${noteText ? 'has-note' : ''}" 
                  data-comp="${item.comp_id}" 
                  data-note="${noteText.replace(/"/g, '&quot;')}"
                  onclick="openNoteModal(this)"
                  title="点击编辑备注">
            ${noteLabel}
          </button>
        `;

        actionBtns += `<button onclick="unselectComp('${item.comp_id}', this)" class="action-btn btn-remove" title="移除报名">移除比赛</button>`;

        return `
          <tr>
            <td style="color:#94a3b8;font-weight:600;">${i + 1}</td>
            <td class="comp-name-cell">
              <span class="${linkClass}" onclick="goToOfficialUrl('${item.comp_id}')" title="${hasUrl ? '点击跳转官网' : '暂无官网链接'}">
                ${item.comp_name}
              </span>
              ${urg ? '<span class="urgent-badge">⚡ 即将截止</span>' : ''}
            </td>
            <td><span class="badge badge-${item.comp_level}">${item.comp_level}</span></td>
            <td class="time-cell">${displayTime}</td>
            <td class="time-cell official-time">${officialTime || '待定'}</td>
            <td><div class="action-cell">${actionBtns}</div></td>
          </tr>`;
      }).join('');

      updateCount(data.length, urgent);
    } catch (e) {
      console.error(e);
      body.innerHTML = `
        <tr><td colspan="6" style="text-align:center;padding:48px;color:#ef4444;">
          ⚠️ 加载失败，请确认后端服务已启动
        </td></tr>`;
      updateCount('—', '—');
    }
  }

  function updateCount(total, urgent) {
    document.getElementById('totalCount').innerText = total;
    document.getElementById('urgentCount').innerText = urgent;
  }

  function logout() {
    if (confirm('确定要退出登录吗？')) {
      localStorage.clear();
      location.href = 'login.html';
    }
  }

  // 点击模态框背景关闭
  document.getElementById('dateModal').addEventListener('click', function(e) {
    if (e.target === this) hideModal();
  });
  document.getElementById('noteModal').addEventListener('click', function(e) {
    if (e.target === this) closeNoteModal();
  });

  window.onload = loadMySchedule;
</script>
</body>
</html>
