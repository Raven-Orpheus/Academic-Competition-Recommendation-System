<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页 — 赛事推荐与日程管理系统</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1d4ed8;
    --primary-dark: #1e3a8a;
    --surface: #ffffff;
    --bg: #f1f5f9;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-sub: #64748b;
  }
  body { background: var(--bg); font-family: "Microsoft YaHei", "PingFang SC", sans-serif; min-height: 100vh; }

  /* ── Navbar ── */
  .navbar {
    background: var(--primary-dark); color: #fff;
    padding: 0 48px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .navbar-brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
  .navbar-brand .trophy { font-size: 22px; }
  .navbar-right { display: flex; align-items: center; gap: 24px; }
  .navbar-user { font-size: 14px; color: rgba(255,255,255,0.8); }
  .navbar-user .name { color: #93c5fd; font-weight: 600; }
  .navbar-user .role-badge {
    display: inline-block; margin-left: 8px; padding: 2px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.15);
    color: #93c5fd; border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-logout {
    padding: 7px 18px; border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 8px; color: rgba(255,255,255,0.85); background: transparent;
    cursor: pointer; font-size: 13px; font-family: inherit;
    transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.12); border-color: #fff; color: #fff; }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 55%, #3b82f6 100%);
    color: #fff; padding: 64px 48px 56px; text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.06) 0%, transparent 60%);
  }
  .hero h1 { font-size: 34px; font-weight: 700; margin-bottom: 12px; letter-spacing: 1px; }
  .hero p { font-size: 16px; opacity: 0.8; max-width: 500px; margin: 0 auto; line-height: 1.7; }
  .hero-stats {
    display: flex; justify-content: center; gap: 48px; margin-top: 36px;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .label { font-size: 12px; opacity: 0.7; margin-top: 4px; }
  .stat .divider-v { width: 1px; height: 40px; background: rgba(255,255,255,0.2); align-self: center; }

  /* ── Cards ── */
  .section { padding: 52px 48px; max-width: 1100px; margin: 0 auto; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 28px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 12px; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .mode-card {
    background: var(--surface); border-radius: 16px; padding: 36px 32px;
    cursor: pointer; border: 2px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: all 0.25s; display: flex; gap: 24px; align-items: flex-start;
  }
  .mode-card:hover {
    border-color: var(--primary); transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(29,78,216,0.14);
  }
  .mode-card .card-icon {
    width: 60px; height: 60px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .mode-card:nth-child(1) .card-icon { background: #eff6ff; }
  .mode-card:nth-child(2) .card-icon { background: #f0fdf4; }
  .mode-card .card-body { flex: 1; }
  .mode-card h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 700; }
  .mode-card p { color: var(--text-sub); font-size: 13px; line-height: 1.7; }
  .mode-card .btn-go {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 18px; padding: 9px 20px; background: var(--primary); color: #fff;
    border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
  }
  .mode-card .btn-go:hover { background: var(--primary-dark); }

  /* ── Quick Links ── */
  .quick-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .quick-link {
    background: var(--surface); border-radius: 12px; padding: 22px 20px;
    text-align: center; text-decoration: none; border: 1.5px solid var(--border);
    transition: all 0.2s; cursor: pointer;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .quick-link:hover { border-color: var(--primary); background: #eff6ff; transform: translateY(-2px); }
  .quick-link .ql-icon { font-size: 28px; margin-bottom: 8px; }
  .quick-link .ql-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .quick-link .ql-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-brand">
    <span class="trophy">🏆</span>
    赛事推荐与日程管理系统
  </div>
  <div class="navbar-right">
    <div class="navbar-user">
      欢迎，<span class="name" id="uname">同学</span>
      <span class="role-badge" id="roleBadge">学生</span>
    </div>
    <button class="btn-logout" onclick="logout()">退出登录</button>
  </div>
</div>

<div class="hero">
  <h1>智能赛事推荐平台</h1>
  <p>根据您的专业方向，精准匹配适合您的竞赛项目，一站式管理参赛全流程</p>
  <div class="hero-stats">
    <div class="stat"><div class="num">100+</div><div class="label">已收录赛事</div></div>
    <div class="stat"><div class="num">国 / 省 / 校</div><div class="label">多层级赛事</div></div>
    <div class="stat"><div class="num">实时</div><div class="label">日程提醒</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">选择浏览模式</div>
  <div class="mode-grid">
    <!-- 两个卡片都跳转到 competition.html，不再区分模式 -->
    <div class="mode-card" onclick="location.href='competition.html'">
      <div class="card-icon">🏫</div>
      <div class="card-body">
        <h3>学院专属推荐</h3>
        <p>系统将根据您的专业方向，智能筛选与匹配最适合您的竞赛项目，提升参赛精准度与获奖可能性。</p>
        <button class="btn-go">进入推荐 →</button>
      </div>
    </div>
    <div class="mode-card" onclick="location.href='competition.html'">
      <div class="card-icon">🔍</div>
      <div class="card-body">
        <h3>全量赛事浏览</h3>
        <p>浏览系统收录的所有赛事，支持按级别、专业类型和关键词自由筛选，探索更多跨专业参赛机会。</p>
        <button class="btn-go">浏览全部 →</button>
      </div>
    </div>
  </div>
</div>

<div class="section" style="padding-top: 0;">
  <div class="section-title">快速入口</div>
  <div class="quick-links">
    <a class="quick-link" href="schedule.html">
      <div class="ql-icon">📅</div>
      <div class="ql-text">我的日程</div>
      <div class="ql-sub">查看已报名赛事安排</div>
    </a>
    <a class="quick-link" href="competition.html">
      <div class="ql-icon">🎯</div>
      <div class="ql-text">赛事列表</div>
      <div class="ql-sub">浏览并报名参赛</div>
    </a>
    <a class="quick-link" href="feedback.html">
      <div class="ql-icon">💬</div>
      <div class="ql-text">意见反馈</div>
      <div class="ql-sub">提交建议与问题</div>
    </a>
  </div>
</div>

<script>
  const BASE = `http://127.0.0.1:5000`;
  const uname = localStorage.getItem('username') || '同学';
  const role = localStorage.getItem('role') || 'student';

  // 显示用户名和角色
  document.getElementById('uname').innerText = uname;
  const roleBadge = document.getElementById('roleBadge');
  if (role === 'admin') {
    roleBadge.innerText = '管理员';
    roleBadge.style.background = 'rgba(255,215,0,0.2)';
    roleBadge.style.color = '#ffd700';
    roleBadge.style.borderColor = 'rgba(255,215,0,0.3)';
  } else {
    roleBadge.innerText = '学生';
  }

  // 两个卡片不再需要 mode 参数，已直接使用 location.href

  function logout() {
    if (confirm('确定要退出登录吗？')) {
      localStorage.clear();
      window.location.href = 'login.html';
    }
  }
</script>
</body>
</html>
